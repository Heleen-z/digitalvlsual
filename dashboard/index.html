<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>开源大模型性能演进可视化分析</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">数据处理与可视化课程项目</p>
        <h1>开源大语言模型性能演进与架构特征分析</h1>
      </div>
      <a class="ppt-link" href="../presentation/LLM项目课堂展示.pptx">下载课堂 PPT</a>
    </header>

    <main>
      <section class="summary-grid" aria-label="项目摘要">
        <article>
          <span>处理流程</span>
          <strong>清洗 → 插补 → 归一化 → 特征工程 → 可视化</strong>
        </article>
        <article>
          <span>核心对象</span>
          <strong>2024-2026 LLM 基准、Elo、架构与硬件延迟</strong>
        </article>
        <article>
          <span>本地部署</span>
          <strong>Python + Pillow + 静态网页，无外部 CDN</strong>
        </article>
      </section>

      <section class="workflow">
        <h2>数据处理逻辑</h2>
        <div class="steps">
          <div><b>1</b><span>从模型名提取参数量，修正 -1 与缺失值</span></div>
          <div><b>2</b><span>基于六类客观基准手写 KNN 插补 Elo</span></div>
          <div><b>3</b><span>Min-Max 归一化，构造效率与硬件帕累托指数</span></div>
          <div><b>4</b><span>输出 CSV、PNG 图表与课堂展示 PPT</span></div>
        </div>
      </section>

      <section class="figures" aria-label="可视化图表">
        <figure>
          <img src="./assets/figures/01_scaling_bubble.png" alt="参数规模与人类偏好 Elo 的气泡散点图" />
          <figcaption>图一：参数规模并不线性决定人类偏好，8B 级高质量微调模型呈现明显能力密度优势。</figcaption>
        </figure>
        <figure>
          <img src="./assets/figures/02_radar_profile.png" alt="7B-9B 量级模型能力雷达图" />
          <figcaption>图二：雷达图揭示同参数量级下的能力轮廓差异，尤其是 GPQA 与 MATH 的偏科现象。</figcaption>
        </figure>
        <figure>
          <img src="./assets/figures/03_architecture_heatmap.png" alt="开源架构与训练范式热力矩阵" />
          <figcaption>图三：Llama 与 Qwen 系列构成主流底座，MoE、蒸馏和领域微调推动二次开发。</figcaption>
        </figure>
        <figure>
          <img src="./assets/figures/04_correlation_matrix.png" alt="客观基准与人类偏好 Pearson 相关矩阵" />
          <figcaption>图四：相关矩阵回答“哪些测试更接近人类偏好”，并显示延迟对真实体验的压力。</figcaption>
        </figure>
        <figure>
          <img src="./assets/figures/05_hardware_jointplot.png" alt="本地硬件性能联合分布与帕累托前沿" />
          <figcaption>图五：高吞吐、低首字延迟的右下区域是本地部署的黄金候选空间。</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
